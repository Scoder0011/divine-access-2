<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Chamber — Divine Access II</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold2: #f0d080;
      --dark: #080608; --surface: #100e12;
      --border: #2a2030; --text: #d4c9a8; --muted: #6b5f4a;
    }
    body {
      background: var(--dark); color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 2rem;
    }
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3rem 2.5rem;
      width: min(520px, 94vw);
      text-align: center;
    }
    .card::before, .card::after {
      content: ''; position: absolute;
      width: 28px; height: 28px;
      border-color: var(--gold); border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .sigil { font-size: 2.4rem; margin-bottom: 1rem; color: var(--gold); }
    h1 {
      font-family: 'Cinzel', serif; font-size: 1.4rem;
      font-weight: 700; color: var(--gold);
      letter-spacing: 0.15em; text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 0.7rem; color: var(--muted);
      letter-spacing: 0.25em; text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 2rem;
    }
    .info-block {
      background: #0d0b10;
      border: 1px solid var(--border);
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      text-align: left;
    }
    .info-block .label {
      font-size: 0.6rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 0.3rem;
    }
    .info-block .value {
      font-size: 0.95rem; color: var(--gold2);
      font-family: monospace; word-break: break-all;
    }
    .rank-pawn { color: var(--muted) !important; }
    .rank-king { color: var(--gold2) !important; font-weight: bold; }
    .profile-link {
      display: inline-block;
      margin-top: 1.8rem;
      padding: 0.75rem 2rem;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }
    .profile-link:hover { background: var(--gold); color: var(--dark); }
    .logout {
      display: block;
      margin-top: 1rem;
      background: none; border: none;
      color: var(--muted); font-size: 0.7rem;
      cursor: pointer; letter-spacing: 0.1em;
      text-transform: uppercase;
      width: 100%; text-align: center;
    }
    .logout:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="sigil">⚔</div>
    <h1>The Chamber</h1>
    <p class="subtitle">Inner Sanctum — Granted</p>
    <div class="divider"></div>

    <div class="info-block">
      <div class="label">Identity</div>
      <div class="value" id="disp-username">—</div>
    </div>
    <div class="info-block">
      <div class="label">Rank</div>
      <div class="value" id="disp-role">—</div>
    </div>

    <a class="profile-link" id="profile-link" href="#">View Your Profile</a>
    <button class="logout" onclick="logout()">Abandon the Chamber</button>
  </div>

  <script src="/js/md5.js"></script>
  <script src="/js/users.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const user = requireAuth('/');
    if (user) {
      document.getElementById('disp-username').textContent = user.username;
      const rankEl = document.getElementById('disp-role');
      if (user.role === 'admin') {
        rankEl.textContent = 'KING';
        rankEl.className = 'value rank-king';
      } else {
        rankEl.textContent = 'PAWN';
        rankEl.className = 'value rank-pawn';
      }
      const hash = md5(String(user.id));
      document.getElementById('profile-link').href = '/user/' + hash;
    }
  </script>
</body>
</html>
