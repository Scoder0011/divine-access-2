<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Vault — Divine Access II</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold2: #f0d080;
      --dark: #080608; --surface: #100e12;
      --border: #2a2030; --text: #d4c9a8; --muted: #6b5f4a;
    }
    body {
      background: var(--dark); color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 2rem;
      overflow: hidden;
    }
    /* particle shimmer */
    body::before {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 65%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.2); }
    }
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid rgba(201,168,76,0.5);
      padding: 3.5rem 3rem;
      width: min(580px, 94vw);
      text-align: center;
      animation: appear 1s ease forwards;
    }
    @keyframes appear {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before, .card::after {
      content: ''; position: absolute;
      width: 36px; height: 36px;
      border-color: var(--gold); border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .sigil {
      font-size: 3.5rem; margin-bottom: 1.2rem;
      animation: glow 2.5s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 8px var(--gold)); }
      50%       { filter: drop-shadow(0 0 28px var(--gold2)); }
    }
    h1 {
      font-family: 'Cinzel', serif; font-size: 1.7rem;
      font-weight: 900; color: var(--gold);
      letter-spacing: 0.2em; text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-size: 0.7rem; color: var(--muted);
      letter-spacing: 0.3em; text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .divider {
      width: 100px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 2.5rem;
    }
    .congrats {
      font-size: 0.85rem; color: var(--muted);
      margin-bottom: 2rem; line-height: 1.8;
      letter-spacing: 0.03em;
    }
    .congrats span { color: var(--gold2); }
    .flag-box {
      background: #06050a;
      border: 1px solid var(--gold);
      padding: 1.5rem 2rem;
      margin: 1.5rem 0;
      position: relative;
    }
    .flag-box::before {
      content: '⚑ FLAG';
      position: absolute;
      top: -0.65rem; left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      padding: 0 0.8rem;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--gold);
    }
    .flag {
      font-family: monospace;
      font-size: 1.1rem;
      color: var(--gold2);
      letter-spacing: 0.08em;
      word-break: break-all;
      user-select: all;
    }
    .copy-btn {
      margin-top: 1.5rem;
      padding: 0.7rem 2rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    .copy-btn:hover { background: var(--gold); color: var(--dark); }
    .footer-rune {
      margin-top: 2.5rem;
      font-size: 0.6rem;
      color: #1e1a22;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="sigil">⚜</div>
    <h1>The Sacred Vault</h1>
    <p class="subtitle">Divine Access — Fully Granted</p>
    <div class="divider"></div>

    <p class="congrats">
      You have traversed the divine registry, unravelled the seal of identity,<br/>
      and bent the sacred token to your will.<br/><br/>
      <span>The Lord's vault yields to you.</span>
    </p>

    <div class="flag-box">
      <div class="flag">CyC0g{y0u_4r3_7h3_d1v1n3_l0rd_n0w}</div>
    </div>

    <button class="copy-btn" onclick="copyFlag()">Copy Flag</button>

    <p class="footer-rune">⚜ DIVINE ACCESS II — sc0d3r ⚜</p>
  </div>

  <script>
    function copyFlag() {
      navigator.clipboard.writeText('CyC0g{y0u_4r3_7h3_d1v1n3_l0rd_n0w}')
        .then(() => {
          const btn = document.querySelector('.copy-btn');
          btn.textContent = 'Copied ✓';
          setTimeout(() => btn.textContent = 'Copy Flag', 2000);
        });
    }
  </script>
</body>
</html>
