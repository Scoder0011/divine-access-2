<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Divine Access II</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:    #c9a84c;
      --gold2:   #f0d080;
      --dark:    #080608;
      --surface: #100e12;
      --border:  #2a2030;
      --text:    #d4c9a8;
      --muted:   #6b5f4a;
      --red:     #c94c4c;
    }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
    }
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3rem 2.5rem;
      width: min(420px, 92vw);
      text-align: center;
    }
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 30px; height: 30px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .badge {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 0.2rem 0.6rem;
      margin-bottom: 1rem;
      opacity: 0.7;
    }
    .sigil {
      font-size: 2.8rem;
      margin-bottom: 1rem;
      animation: glow 4s ease-in-out infinite;
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 4px var(--gold)); }
      50%       { filter: drop-shadow(0 0 16px var(--gold2)); }
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 2rem;
    }
    .field { margin-bottom: 1.2rem; text-align: left; }
    label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input {
      width: 100%;
      background: #0d0b10;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: var(--gold); }
    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.85rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    button:hover { background: var(--gold); color: var(--dark); }
    .msg {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    .msg.error { color: var(--red); }
    .footer-text {
      margin-top: 2rem;
      font-size: 0.65rem;
      color: #2e2830;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">CHAPTER II</div>
    <div class="sigil">⚜</div>
    <h1>Divine Access</h1>
    <p class="subtitle">The Lord's Inner Sanctum</p>
    <div class="divider"></div>

    <div class="field">
      <label>Identity</label>
      <input type="text" id="username" placeholder="Enter your name" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Passphrase</label>
      <input type="password" id="password" placeholder="Speak your oath"/>
    </div>

    <button onclick="login()">Seek Entry</button>
    <p class="msg" id="msg"></p>
    <p class="footer-text">Only the worthy may pierce the inner sanctum</p>
  </div>

  <script>
    // redirect if already logged in (server is the source of truth now)
    fetch('/api/me').then(r => {
      if (r.ok) window.location.href = '/chamber';
    }).catch(() => {});

    async function login() {
      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value.trim();
      const msg = document.getElementById('msg');

      if (!username || !password) {
        msg.className = 'msg error';
        msg.textContent = 'You must speak both name and oath.';
        return;
      }

      msg.className = 'msg';
      msg.textContent = 'Consulting the divine records...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          msg.textContent = 'Identity acknowledged. Proceeding...';
          setTimeout(() => window.location.href = '/chamber', 700);
        } else {
          msg.className = 'msg error';
          msg.textContent = 'The gate does not recognise you.';
        }
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = 'The records are unreachable. Try again.';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
